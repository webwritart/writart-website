{% extends "base.html" %}
{% block content %}

<style>
.zoom-box {
  width: 400px;
  height: 300px;
  overflow: hidden;
  border: 2px solid #ccc;
  cursor: zoom-in;
}

.zoom-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.1s ease-out; /* Smooths out the panning movement */
}

/* Enlarge the image when hovering over the container */
.zoom-box:hover img {
  transform: scale(2); /* Change the zoom multiplier here */
}

</style>

<div class="zoom-box">
  <img src="/static/files/users/477706/temp/artwork/Bhairav.jpg" alt="Zoomable Image">
</div>

<script>
const zoomBox = document.querySelector('.zoom-box');
const img = zoomBox.querySelector('img');

zoomBox.addEventListener('mousemove', (e) => {
  // Get bounding box coordinates of the container
  const rect = e.currentTarget.getBoundingClientRect();
  
  // Calculate mouse position relative to the container (0 to 100%)
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  
  // Shift the transform origin to the cursor's percentage position
  img.style.transformOrigin = `${x}% ${y}%`;
});

// Optional: Reset origin to center when mouse leaves
zoomBox.addEventListener('mouseleave', () => {
  img.style.transformOrigin = 'center center';
});
</script>

{% endblock %}
