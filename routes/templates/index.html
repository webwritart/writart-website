{% extends "base.html" %}
{% block content %}

<style>
* {box-sizing: border-box;}
.mySlides {display: none;}
img {vertical-align: middle;}

/* Slideshow container */
<!--.slideshow-container {-->
<!--  max-width: 1000px;-->
<!--  position: relative;-->
<!--  margin: auto;-->
<!--}-->

.slideshow-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: black;
    padding-top: 2%;
}

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

.active {
  background-color: #717171;
}

/* Fading animation */
.fade {
  animation-name: fade;
  animation-duration: 2s;
}

@keyframes fade {
  from {opacity: .4}
  to {opacity: 1}
}

/* On smaller screens, decrease text size */
@media only screen and (max-width: 300px) {
  .text {font-size: 11px}
}
</style>


<div class="slideshow-container">
{% for portrait in portrait_list %}
<div class="mySlides fade slideshow_box">
  <img src="{{ portrait }}" style="max-height:100%; max-width: 100%; object-fit: contain;">
</div>
{% endfor %}
<a href="{{ url_for('studio.portraits') }}" class="slideshow-btn" style="margin-bottom:">PORTRAITS</a>
</div>
<br>




<script>
let slideIndex = 0;
showSlides();

function showSlides() {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  slideIndex++;
  if (slideIndex > slides.length) {slideIndex = 1}

  slides[slideIndex-1].style.display = "block";
  setTimeout(showSlides, 2000); // Change image every 2 seconds
}
</script>
{% endblock %}
