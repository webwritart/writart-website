{% extends "base.html" %}
{% block content %}
<style>
    #root-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        align-items: center;
        justify-content: center;
        min-height: 90vh;
    }
    #form-container {
        display: flex;
        width: 50%;
    }
    #form-container form {
        padding: 2%;
        border: solid 2px black;
        width:50%;
    }
    select {
        width: 100%;
    }
    .form-heading {
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        text-transform: uppercase;
    }

    @media (max-width: 1200px) {
        #form-container {
            width: 80%;
        }
    }
    @media (max-width: 700px) {
        #form-container {
            flex-direction: column;
            width: 80%;
        }
        #form-container form {
            width: 100%;
        }
    }
</style>
<div id="root-container">
    <div id="form-container">
        <form id="my_form" action="{{url_for('account.artist_dashboard')}}" method="post">
            <p class="form-heading">Create Invoice/Recipt</p>
            <select name="document" id="document">
                <option value="">Choose Document Type</option>
                <option value="invoice">Invoice</option>
                <option value="receipt">Receipt</option>
            </select>
            <input type="text" name="name" placeholder="Customer's name" required>
            <input type="text" name="address" placeholder="Customer's address" required>
            <input type="text" name="state" placeholder="State" required>
            <input type="text" name="phone" placeholder="Customer's phone" required>
            <input type="text" name="email" placeholder="Customer's email" required>
            <input type="number" name="item_count" id="item_count" placeholder="Total Items" required>
            <input type="text" name="tax_percentage" placeholder="Tax percentage">
            <input type="date" name="date" placeholder="Date">
            <select id="payment_type" name="payment_type">
                <option value="">Select Payment type</option>
                <option value="full">Full</option>
                <option value="partial">Partial</option>
            </select>
            <input id="partial_payment_amt" type="text" name="partial_payment_amount" placeholder="Partial Payment Amount Paid">
            <input id="rec_inv_no" type="text" name="receipt_invoice_no" placeholder="Receipt against Invoice No">
            <button type="submit" id="submit-btn" name="submit" value="create_document" class="btn btn-primary btn-block btn-large">Create Document</button>
        </form>
        <form action="{{url_for('account.artist_dashboard')}}" method="post" enctype="multipart/form-data">
            <p class="form-heading">Create COA</p>
            <label>Artwork Image</label>
            <input type="file" name="artwork-img" accept="image/*">
            <input type="text" name="serial_no" placeholder="Serial No" required>
            <input type="text" name="title" placeholder="title" required>
            <input type="text" name="size" placeholder="size" required>
            <input type="text" name="medium" placeholder="medium" required>
            <input type="text" name="year" placeholder="year" required>
            <input type="text" name="client_name" placeholder="Client name" required>
            <input type="email" name="client_email" placeholder="Client Email (optional)">
            <select name="varnished">
                <option value="">Varnished?</option>
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>
            <select name="signed">
                <option value="">Signed?</option>
                <option value="true">True</option>
                <option value="false">False</option>
            </select>
            <select name="statement">
                <option value="">Statement?</option>
                <option value="unique">Unique</option>
                <option value="print">Print</option>
                <option value="self-copy">Self Copy</option>
            </select>
            <select name="copyright">
                <option value="">Copyright Type</option>
                <option value="allow-none">Allow None</option>
                <option value="allow-reproduction">Allow Reproduction</option>
                <option value="allow-reproduction-commercial">Allow Reproduction and Commercial</option>
            </select>
            <button type="submit" name="submit" value="create-coa" class="btn btn-primary btn-block btn-large">Create COA</button>
        </form>
    </div>
</div>

<script>
    const documentType = document.getElementById('document');
    const paymentType = document.getElementById('payment_type');
    const partialPaymentAmount = document.getElementById('partial_payment_amt');
    const receiptInvoiceNo = document.getElementById('rec_inv_no');
    const itemCount = document.getElementById('item_count');
    const myForm = document.getElementById('my_form');
    const submitBtn = document.getElementById('submit-btn');

    function hideInputs() {
        paymentType.style.display = "none";
        partialPaymentAmount.style.display = "none";
        receiptInvoiceNo.style.display = "none";
    }
    hideInputs();

    // Generates a customized range array
    const range = (start, end, step = 1) => 
    Array.from({ length: Math.ceil((end - start) / step) }, (_, i) => start + i * step);

   
    

    documentType.addEventListener('change', (event) => {
        const documentValue = event.target.value;
        if (documentValue == 'invoice') {
            paymentType.style.display = "none";
        partialPaymentAmount.style.display = "none";
        } else if (documentValue == 'receipt') {
            paymentType.style.display = "block";
            receiptInvoiceNo.style.display = "block";
        }
    });
    paymentType.addEventListener('change', (event) => {
        const paymentTypeValue = event.target.value;
        if (paymentTypeValue == 'full') {
            partialPaymentAmount.style.display = "none";
        } else {
            partialPaymentAmount.style.display = "block";
        }
    });
    itemCount.addEventListener('change', (event) => {
        const itemCountValue = event.target.value;
        const itemElements = document.querySelectorAll('.item');

        itemElements.forEach(element => {
            element.style.display = "none";
        });

        for (const num of range(0, itemCountValue, 1)) {
            const newInput = document.createElement('input');
            const newItemPrice = document.createElement('input');
            const newItemQty = document.createElement('input');
            const itemNo = num+1;
            newInput.type = 'text';
            newInput.name = 'item'+itemNo;
            newInput.classList.add("item");
            newInput.placeholder = 'Item '+itemNo;
            myForm.appendChild(newInput);

            newItemPrice.type = 'number';
            newItemPrice.name = 'item'+itemNo+'price';
            newItemPrice.classList.add("item");
            newItemPrice.placeholder = 'Item '+itemNo+' Price';
            myForm.appendChild(newItemPrice);

            newItemQty.type = 'number';
            newItemQty.name = 'item'+itemNo+'qty';
            newItemQty.classList.add("item");
            newItemQty.placeholder = 'Item '+itemNo+' Quantity';
            myForm.appendChild(newItemQty);

            myForm.appendChild(submitBtn);
            }
        });
</script>


{% endblock %}
