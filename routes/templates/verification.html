{% extends "base.html" %}
{% block content %}

<style>
    #form-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        justify-content: center;
        align-items: center;
        height: 80vh;
    }
    #form {
        width: 50%;
    }
    input {
        color: black;
    }
    #heading {
        font-size: 2rem;
        font-weight: bold;
    }

    @media (max-width: 1200px) {
        #heading {
            font-size: 1.5rem;
        }
        #form button, input{
            font-size: .8rem;
        }
        
    }
    @media (max-width: 600px) {
        #form {
            width: 80%;
        }
        #heading {
            font-size: 1.3rem;
        }
        #form button, input {
            font-size: .7rem;
        }
    }
</style>
<div id="form-container">
    <p id="heading">VERIFY CERTIFICATE</p>
    <form id="form" action="{{url_for('main.verification')}}" method="post">
        <input type="text" placeholder="Certificate ID" name="certificate-id">
        <button class="btn btn-primary btn-block btn-large" type="submit" name="submit" value="verify-certificate">Verify Certificate</button>
    </form>
</div>


{% endblock %}
